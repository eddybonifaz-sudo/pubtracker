<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>PubTracker</title>
    <script>
      // Redirigir rutas SPA al index
      var path = window.location.pathname;
      window.location.replace(
        window.location.origin + '/pubtracker/' + '?p=' +
        path.slice(1)
      );
    </script>
  </head>
  <body></body>
</html>
